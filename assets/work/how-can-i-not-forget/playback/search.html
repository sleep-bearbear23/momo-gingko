<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORION</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .page-content {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Background layers */
    .bg-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-layer::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 40, 50, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 40, 50, 0.07) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .bg-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        /* dark vignette toward edges */
        radial-gradient(ellipse 90% 80% at 50% 46%, transparent 38%, rgba(0, 28, 38, 0.13) 100%),
        /* bright oval in the centre where logo sits */
        radial-gradient(ellipse 55% 50% at 50% 42%, rgba(255, 255, 255, 0.72) 0%, rgba(255, 255, 255, 0.18) 55%, transparent 100%),
        /* subtle concentric rings */
        radial-gradient(circle at 50% 50%, transparent 140px, rgba(0, 40, 50, 0.03) 141px, transparent 142px),
        radial-gradient(circle at 50% 50%, transparent 260px, rgba(0, 40, 50, 0.025) 261px, transparent 262px),
        radial-gradient(circle at 50% 50%, transparent 400px, rgba(0, 40, 50, 0.018) 401px, transparent 402px);
    }

    .corner-mark {
      position: absolute;
      width: 36px;
      height: 36px;
      opacity: 0.13;
    }

    .corner-mark.tl {
      top: 28px;
      left: 28px;
      border-top: 1px solid #1c1a17;
      border-left: 1px solid #1c1a17;
    }

    .corner-mark.tr {
      top: 28px;
      right: 28px;
      border-top: 1px solid #1c1a17;
      border-right: 1px solid #1c1a17;
    }

    .corner-mark.bl {
      bottom: 28px;
      left: 28px;
      border-bottom: 1px solid #1c1a17;
      border-left: 1px solid #1c1a17;
    }

    .corner-mark.br {
      bottom: 28px;
      right: 28px;
      border-bottom: 1px solid #1c1a17;
      border-right: 1px solid #1c1a17;
    }

    .coord {
      position: absolute;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(28, 26, 23, 0.18);
      font-family: 'DM Sans', monospace;
    }

    .coord.tl {
      top: 12px;
      left: 12px;
    }

    .coord.tr {
      top: 12px;
      right: 12px;
      text-align: right;
    }

    .coord.bl {
      bottom: 12px;
      left: 12px;
    }

    .coord.br {
      bottom: 12px;
      right: 12px;
      text-align: right;
    }

    /* Container */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 780px;
      padding: 0 32px;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo {
      margin-bottom: 56px;
    }

    #logoCanvas {
      display: block;
    }

    /* Search */
    .search-wrapper {
      width: 100%;
      position: relative;
    }

    .search-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 62px 20px 26px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.22s, box-shadow 0.22s;
      resize: none;
      min-height: 68px;
      max-height: 220px;
      line-height: 1.5;
      box-shadow: var(--shadow);
    }

    .search-box::placeholder {
      color: var(--text-dimmer);
    }

    .search-box:focus {
      border-color: var(--border-mid);
      box-shadow: var(--shadow-focus);
    }

    .search-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      background: var(--text);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.18s, transform 0.14s;
    }

    .search-btn:hover {
      opacity: 0.72;
    }

    .search-btn:active {
      transform: translateY(-50%) scale(0.93);
    }

    .search-btn svg {
      width: 15px;
      height: 15px;
      color: #fff;
    }

    /* Status */
    .status-bar {
      margin-top: 52px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.69rem;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
    }
  </style>
</head>

<body>

  <div class="browser-window">

    <!-- Browser chrome -->
    <div class="browser-chrome">
      <div class="chrome-left">
        <div class="traffic-lights">
          <div class="tl tl-red"></div>
          <div class="tl tl-yellow"></div>
          <div class="tl tl-green"></div>
        </div>
        <button class="nav-btn disabled">
          <svg viewBox="0 0 14 14" fill="none">
            <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
        <button class="nav-btn disabled">
          <svg viewBox="0 0 14 14" fill="none">
            <path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
      <div class="url-bar">
        <svg class="url-lock" viewBox="0 0 12 14" fill="none">
          <rect x="1" y="6" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2" />
          <path d="M3.5 6V4a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
        </svg>
        <div class="url-text">orion.search / <span>home</span></div>
      </div>
      <div class="chrome-right">
        <div class="b-icon"><svg viewBox="0 0 15 15" fill="none">
            <path d="M5 7.5H2a1 1 0 00-1 1V13a1 1 0 001 1h11a1 1 0 001-1V8.5a1 1 0 00-1-1h-3M7.5 1v8M5 3.5L7.5 1 10 3.5"
              stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
          </svg></div>
        <div class="b-icon"><svg viewBox="0 0 13 15" fill="none">
            <path d="M1 1h11v13L6.5 10 1 14V1z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg></div>
      </div>
    </div>

    <!-- Page -->
    <div class="page-content">
      <div class="bg-layer"></div>
      <div class="corner-mark tl"></div>
      <div class="corner-mark tr"></div>
      <div class="corner-mark bl"></div>
      <div class="corner-mark br"></div>
      <div class="coord tl">34.052°N</div>
      <div class="coord tr">118.243°W</div>
      <div class="coord bl">2030.04.28</div>
      <div class="coord br">v4.1.0</div>

      <nav class="app-nav">
        <button class="app-nav-btn" title="Sign in">
          <svg viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.3" />
            <path d="M2.5 14c0-3.038 2.462-5.5 5.5-5.5s5.5 2.462 5.5 5.5" stroke="currentColor" stroke-width="1.3"
              stroke-linecap="round" />
          </svg>
        </button>
        <button class="app-nav-btn" title="Settings">
          <svg viewBox="0 0 16 16" fill="none">
            <line x1="2" y1="4.5" x2="14" y2="4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
            <line x1="2" y1="11.5" x2="14" y2="11.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
            <circle cx="5.5" cy="4.5" r="1.8" fill="var(--bg)" stroke="currentColor" stroke-width="1.3" />
            <circle cx="10.5" cy="11.5" r="1.8" fill="var(--bg)" stroke="currentColor" stroke-width="1.3" />
          </svg>
        </button>
      </nav>

      <div class="container">
        <div class="logo"><canvas id="logoCanvas"></canvas></div>

        <div class="search-wrapper">
          <textarea class="search-box" id="searchInput" placeholder="Search…" rows="1" autocomplete="off"
            spellcheck="false" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="search-btn" onclick="doSearch()">
            <svg viewBox="0 0 14 14" fill="none">
              <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4" />
              <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
          </button>
        </div>

        <div class="thinking" id="thinking">
          <div class="thinking-dot"></div>
          <div class="thinking-dot"></div>
          <div class="thinking-dot"></div>
          <span>searching</span>
        </div>

        <div class="status-bar">
          <div class="status-dot-el"></div>
          <span>Connected · Secure · Los Angeles · 2030</span>
        </div>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    // Draw logo
    drawOrionLogo(document.getElementById('logoCanvas'), 68);

    // Route state: 1=riot, 2=massacre, 3=voices
    let activeRoute = 1;
    const DEST = {
      1: 'results_riot.html',
      2: 'results_massacre.html',
      3: 'results_voices.html',
    };

    // Left/right arrow keys cycle the active route when search box is NOT focused.
    // shared.js handles up/down for font size on the same condition — no conflict.
    document.addEventListener('keydown', function (e) {
      const focused = document.activeElement;
      const searchFocused = focused && (focused.id === 'searchInput');
      if (searchFocused) return; // let the textarea handle its own keys

      if (e.key === 'ArrowRight') {
        e.preventDefault();
        activeRoute = (activeRoute % 3) + 1; // 1→2→3→1
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        activeRoute = ((activeRoute - 2 + 3) % 3) + 1; // 1→3→2→1
      }
    });

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 220) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSearch(); }
    }

    let searching = false;
    function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q || searching) return;
      searching = true;
      const logo = document.getElementById('logoCanvas');
      if (logo._orionSpin) logo._orionSpin();
      document.getElementById('thinking').classList.add('active');
      setTimeout(() => {
        window.location.href = DEST[activeRoute] + '?q=' + encodeURIComponent(q);
      }, 1200);
    }
  </script>
</body>

</html>
